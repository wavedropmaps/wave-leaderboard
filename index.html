// ─── MILESTONE THRESHOLDS ────────────────────────────────────────────────────
const DUTIES = {
  message: { label: "Messages",        emoji: "💬", color: "#a78bfa", thresholds: { Bronze: 1000,  Silver: 3000,  Gold: 8000,  Legend: 10000,  God: 50000  } },
  roll:    { label: "Roll Duty",        emoji: "🎲", color: "#60a5fa", thresholds: { Bronze: 500,   Silver: 1500,  Gold: 4000,  Legend: 5000,   God: 25000  } },
  req:     { label: "RQ Duty",          emoji: "🗺️", color: "#34d399", thresholds: { Bronze: 250,   Silver: 750,   Gold: 2000,  Legend: 2500,   God: 12500  } },
  purge:   { label: "Purge/Perchitty",  emoji: "🛡️", color: "#f87171", thresholds: { Bronze: 250,   Silver: 750,   Gold: 2000,  Legend: 2500,   God: 12500  } },
  modlog:  { label: "Mod Log",          emoji: "📋", color: "#fbbf24", thresholds: { Bronze: 50,    Silver: 200,   Gold: 500,   Legend: 1000,   God: 10000  } },
};

const TIERS = ["Bronze", "Silver", "Gold", "Legend", "God"];

const TIER_CFG = {
  Bronze: { bg: "linear-gradient(135deg,#92400e,#78350f)", border: "#b45309", text: "#fde68a", icon: "🥉", glow: "#b4530944" },
  Silver: { bg: "linear-gradient(135deg,#4b5563,#374151)", border: "#9ca3af", text: "#f3f4f6", icon: "🥈", glow: "#9ca3af44" },
  Gold:   { bg: "linear-gradient(135deg,#78350f,#451a03)", border: "#fbbf24", text: "#fef08a", icon: "🥇", glow: "#fbbf2455" },
  Legend: { bg: "linear-gradient(135deg,#4c1d95,#1e1b4b)", border: "#a78bfa", text: "#e9d5ff", icon: "⚡", glow: "#a78bfa55" },
  God:    { bg: "linear-gradient(135deg,#7c2d12,#831843)", border: "#f43f5e", text: "#fce7f3", icon: "👑", glow: "#f43f5e66" },
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getEarnedBadges(scores = {}) {
  const badges = {};
  for (const [dk, d] of Object.entries(DUTIES)) {
    const score = scores[dk] || 0;
    let highest = null;
    for (const tier of TIERS) if (score >= d.thresholds[tier]) highest = tier;
    if (highest) badges[dk] = highest;
  }
  return badges;
}

function getTopTier(badges) {
  return TIERS.slice().reverse().find(t => Object.values(badges).includes(t)) || null;
}

function getNextTarget(scores, dutyKey) {
  const d = DUTIES[dutyKey];
  const score = scores[dutyKey] || 0;
  for (const tier of TIERS) if (score < d.thresholds[tier]) return { tier, needed: d.thresholds[tier], score };
  return null;
}

// ─── BADGE PILL ───────────────────────────────────────────────────────────────
function Badge({ dutyKey, tier, size = "md" }) {
  const d = DUTIES[dutyKey];
  const t = TIER_CFG[tier];
  const p  = size === "sm" ? "3px 8px"   : size === "lg" ? "8px 18px" : "5px 12px";
  const fs = size === "sm" ? "10px"      : size === "lg" ? "15px"     : "12px";
  const ef = size === "sm" ? "13px"      : size === "lg" ? "22px"     : "16px";
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:t.bg,
      border:`1px solid ${t.border}`, borderRadius:8, padding:p,
      boxShadow:`0 0 10px ${t.glow}`, fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>
      <span style={{fontSize:ef}}>{t.icon}</span>
      <span style={{fontSize:ef}}>{d.emoji}</span>
      <div style={{lineHeight:1}}>
        <div style={{fontSize:fs, color:t.text}}>{d.label}</div>
        <div style={{fontSize:"9px", color:t.border, letterSpacing:"0.1em", textTransform:"uppercase"}}>{tier}</div>
      </div>
    </div>
  );
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function ProgressBar({ dutyKey, score }) {
  const d = DUTIES[dutyKey];
  const next = getNextTarget({ [dutyKey]: score }, dutyKey);
  if (!next) return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
        <span style={{fontSize:12, color:d.color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700}}>{d.emoji} {d.label}</span>
        <span style={{fontSize:11, color:"#f43f5e", fontFamily:"'JetBrains Mono',monospace"}}>👑 MAXED</span>
      </div>
      <div style={{height:6, borderRadius:4, background:`linear-gradient(90deg,${d.color},#f43f5e)`, boxShadow:`0 0 8px ${d.color}88`}}/>
    </div>
  );
  const prevIdx = TIERS.indexOf(next.tier) - 1;
  const prevVal = prevIdx >= 0 ? d.thresholds[TIERS[prevIdx]] : 0;
  const pct = Math.min(100, Math.max(0, ((score - prevVal) / (next.needed - prevVal)) * 100));
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
        <span style={{fontSize:12, color:d.color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700}}>{d.emoji} {d.label}</span>
        <span style={{fontSize:11, color:"#666", fontFamily:"'JetBrains Mono',monospace"}}>
          {score.toLocaleString()} / {next.needed.toLocaleString()} → {TIER_CFG[next.tier].icon} {next.tier}
        </span>
      </div>
      <div style={{height:6, borderRadius:4, background:"#1e2028"}}>
        <div style={{height:"100%", borderRadius:4, width:`${pct}%`,
          background:`linear-gradient(90deg,${d.color}88,${d.color})`,
          boxShadow:`0 0 6px ${d.color}66`, transition:"width 0.7s cubic-bezier(0.4,0,0.2,1)"}}/>
      </div>
    </div>
  );
}

            📈 Progress to Next Badge

            {Object.entries(DUTIES).map(([dk,d]) => (
              <span key={dk}>{d.emoji} {(staff.scores[dk]||0).toLocaleString()}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel({ staffList, onSave, onClose }) {
  const [data, setData] = useState(() => staffList.map(s => ({name:s.name, scores:{...s.scores}})));
  const [newName, setNewName] = useState("");

  function update(idx, dk, val) {
    setData(prev => { const n=[...prev]; n[idx]={...n[idx], scores:{...n[idx].scores, [dk]:parseInt(val)||0}}; return n; });
  }
  function addStaff() {
    if (!newName.trim()) return;
    setData(prev => [...prev, {name:newName.trim(), scores:{}}]);
    setNewName("");
  }
  function removeStaff(idx) { setData(prev => prev.filter((_,i)=>i!==idx)); }

  return (
    <div style={{position:"fixed", inset:0, background:"#000000dd", backdropFilter:"blur(10px)",
      display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000, padding:20}}>
      <div style={{background:"#0e1116", border:"1px solid #2a2d38", borderRadius:20,
        padding:28, width:"100%", maxWidth:720, maxHeight:"90vh", overflowY:"auto",
        boxShadow:"0 32px 80px #00000099"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24}}>
          <h2 style={{color:"#f0f0f0", fontFamily:"'Rajdhani',sans-serif", fontWeight:800, fontSize:22, margin:0}}>⚙️ Admin — Update Scores</h2>
          <button onClick={onClose} style={{background:"#1e2028", border:"1px solid #2a2d38", borderRadius:8, color:"#666", cursor:"pointer", padding:"6px 12px", fontSize:16}}>✕</button>
        </div>
        <div style={{background:"#1a2035", border:"1px solid #2a4060", borderRadius:10, padding:"10px 16px", marginBottom:20,
          fontSize:12, color:"#60a5fa", fontFamily:"'JetBrains Mono',monospace"}}>
          💡 The bot auto-syncs scores each week from column D of each Google Sheet. You can also set scores manually here.
        </div>
        <div style={{display:"flex", gap:8, marginBottom:20}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addStaff()}
            placeholder="New staff username..."
            style={{flex:1, background:"#141720", border:"1px solid #2a2d38", borderRadius:8,
              color:"#f0f0f0", padding:"8px 14px", fontSize:13, fontFamily:"'JetBrains Mono',monospace", outline:"none"}}/>
          <button onClick={addStaff} style={{background:"linear-gradient(135deg,#a78bfa44,#60a5fa22)",
            border:"1px solid #a78bfa66", borderRadius:8, color:"#a78bfa", cursor:"pointer",
            padding:"8px 18px", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:14}}>+ Add</button>
        </div>
        {data.map((s,idx) => (
          <div key={idx} style={{background:"#141720", border:"1px solid #1e2028", borderRadius:12, padding:"14px 16px", marginBottom:12}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
              <span style={{color:"#e8e8e8", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15}}>{s.name}</span>
              <button onClick={()=>removeStaff(idx)} style={{background:"#f8717118", border:"1px solid #f8717133",
                borderRadius:6, color:"#f87171", cursor:"pointer", padding:"3px 10px", fontSize:12, fontFamily:"'Rajdhani',sans-serif"}}>Remove</button>
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:8}}>
              {Object.entries(DUTIES).map(([dk,d]) => (
                <div key={dk}>
                  <label style={{fontSize:10, color:d.color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:"0.08em", display:"block", marginBottom:3}}>{d.emoji} {d.label}</label>
                  <input type="number" min="0" value={s.scores[dk]||0} onChange={e=>update(idx,dk,e.target.value)}
                    style={{width:"100%", background:"#0e1116", border:`1px solid ${d.color}33`,
                      borderRadius:6, color:d.color, padding:"5px 10px", fontSize:13, fontFamily:"'JetBrains Mono',monospace", outline:"none"}}/>
                </div>
              ))}
            </div>
          </div>
        ))}
        <button onClick={()=>onSave(data)} style={{marginTop:20, width:"100%",
          background:"linear-gradient(135deg,#a78bfa,#60a5fa)", border:"none", borderRadius:10,
          color:"#fff", cursor:"pointer", padding:"12px", fontSize:15,
          fontFamily:"'Rajdhani',sans-serif", fontWeight:800, letterSpacing:"0.05em"}}>
          💾 Save & Update Leaderboard
        </button>
      </div>
    </div>
  );
}

// ─── STAFF CARD ───────────────────────────────────────────────────────────────
function StaffCard({ staff, onClick }) {
  const badges = getEarnedBadges(staff.scores);
  const badgeEntries = Object.entries(badges);
  const topTier = getTopTier(badges);
  const borderColor = topTier ? TIER_CFG[topTier].border : "#1e2028";
  const glowColor   = topTier ? TIER_CFG[topTier].glow   : "transparent";

  return (
    <div onClick={onClick} style={{background:"linear-gradient(145deg,#141720,#0e1116)",
      border:`1px solid ${topTier ? borderColor+"66" : "#1e2028"}`,
      borderRadius:16, padding:"20px 22px", cursor:"pointer",
      boxShadow: topTier ? `0 0 24px ${glowColor}, 0 4px 24px #00000055` : "0 4px 16px #00000044",
      transition:"all 0.25s cubic-bezier(0.4,0,0.2,1)"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px) scale(1.01)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0) scale(1)";}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}>
          <div style={{width:40, height:40, borderRadius:10,
            background: topTier ? `linear-gradient(135deg,${borderColor}44,${borderColor}11)` : "#1e2028",
            border:`1px solid ${borderColor}55`,
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:20, fontFamily:"'Rajdhani',sans-serif", fontWeight:800, color:borderColor}}>
            {staff.name[0].toUpperCase()}
          </div>
          <div>
            <div style={{color:"#f0f0f0", fontFamily:"'Rajdhani',sans-serif", fontWeight:800, fontSize:17}}>{staff.name}</div>
            <div style={{fontSize:10, color:"#333", fontFamily:"'JetBrains Mono',monospace"}}>click for full profile</div>
          </div>
        </div>
        {topTier && (
          <span style={{fontSize:10, fontFamily:"'Rajdhani',sans-serif", fontWeight:700,
            color:TIER_CFG[topTier].border, letterSpacing:"0.1em", textTransform:"uppercase",
            background:`${TIER_CFG[topTier].border}18`, border:`1px solid ${TIER_CFG[topTier].border}44`,
            padding:"2px 9px", borderRadius:6}}>
            {TIER_CFG[topTier].icon} {topTier}
          </span>
        )}
      </div>
      {badgeEntries.length > 0
        ? <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
            {badgeEntries.map(([dk,tier]) => <Badge key={dk} dutyKey={dk} tier={tier} size="sm"/>)}
          </div>
        : <div style={{fontSize:12, color:"#2a2d38", fontFamily:"'JetBrains Mono',monospace", fontStyle:"italic"}}>No badges yet — keep going!</div>
      }
      <div style={{display:"flex", gap:6, marginTop:14, flexWrap:"wrap"}}>
        {Object.entries(DUTIES).map(([dk,d]) => {
          const score = staff.scores[dk] || 0;
          const filled = TIERS.filter(t => score >= d.thresholds[t]).length;
          return (
            <div key={dk} style={{display:"flex", alignItems:"center", gap:2}} title={d.label}>
              <span style={{fontSize:11}}>{d.emoji}</span>
              {TIERS.map((_,ti) => (
                <div key={ti} style={{width:5, height:5, borderRadius:2,
                  background: ti < filled ? d.color : "#1e2028",
                  boxShadow: ti < filled ? `0 0 4px ${d.color}88` : "none"}}/>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [staffList, setStaffList]   = useState(DEMO_STAFF);
  const [selected, setSelected]     = useState(null);
  const [showAdmin, setShowAdmin]   = useState(false);
  const [filterTier, setFilterTier] = useState("All");
  const [search, setSearch]         = useState("");
  const [loaded, setLoaded]         = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const [lastSync, setLastSync]     = useState(null);
  const [dataSource, setDataSource] = useState("demo");

  useEffect(() => {
    (async () => {
      // ── Try fetching live data from GitHub first ──────────────────────────
      try {
        const res = await fetch(DATA_URL + "?t=" + Date.now()); // bust cache
        if (res.ok) {
          const json = await res.json();
          const staff = Object.entries(json).map(([name, scores]) => ({ name, scores }));
          if (staff.length > 0) {
            setStaffList(staff);
            setLastSync(new Date().toISOString());
            setDataSource("github");
            setLoaded(true);
            return;
          }
        }
      } catch {}

      // ── Fall back to persistent storage (last known good data) ───────────
      try {
        const res = await window.storage.get("milestone_staff_v2", true);
        if (res?.value) {
          const parsed = JSON.parse(res.value);
          setStaffList(parsed.staff);
          setLastSync(parsed.lastSync || null);
          setDataSource(parsed.source || "storage");
        }
      } catch {}

      setLoaded(true);
    })();
  }, []);

  async function saveStaff(data, source = "manual") {
    setStaffList(data);
    setShowAdmin(false);
    const payload = { staff: data, lastSync: new Date().toISOString(), source };
    try {
      await window.storage.set("milestone_staff_v2", JSON.stringify(payload), true);
      setSaveStatus("✅ Saved!");
      setDataSource(source);
      setLastSync(payload.lastSync);
    } catch { setSaveStatus("❌ Save failed"); }
    setTimeout(() => setSaveStatus(""), 3000);
  }

  // Import milestone_totals.json written by the bot
  // Format: { "username": { "purge": 100, "req": 50, "role": 200, "modlog": 60, "message": 1200 }, ... }
  function importFromJSON(raw) {
    try {
      const json = JSON.parse(raw);
      const staff = Object.entries(json).map(([name, scores]) => ({ name, scores }));
      if (staff.length === 0) throw new Error("Empty");
      saveStaff(staff, "json");
    } catch { setSaveStatus("❌ Invalid JSON"); setTimeout(()=>setSaveStatus(""),3000); }
  }

  const filtered = staffList
    .filter(s => s.name.toLowerCase().includes(search.toLowerCase()))
    .filter(s => filterTier === "All" || Object.values(getEarnedBadges(s.scores)).includes(filterTier))
    .sort((a,b) => Object.keys(getEarnedBadges(b.scores)).length - Object.keys(getEarnedBadges(a.scores)).length);

  const totalBadgesAwarded = staffList.reduce((sum,s) => sum + Object.keys(getEarnedBadges(s.scores)).length, 0);

  if (!loaded) return (
    <div style={{minHeight:"100vh", background:"#0e1014", display:"flex", alignItems:"center", justifyContent:"center"}}>
      <span style={{color:"#444", fontFamily:"'JetBrains Mono',monospace"}}>Loading...</span>
    </div>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:#0e1014; }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:#0e1014; }
        ::-webkit-scrollbar-thumb { background:#2a2d38; border-radius:3px; }
      `}</style>

      <div style={{minHeight:"100vh",
        background:"radial-gradient(ellipse at 20% 10%,#a78bfa08 0%,transparent 55%), radial-gradient(ellipse at 85% 85%,#60a5fa08 0%,transparent 55%), #0e1014",
        padding:"40px 20px 60px"}}>

        {/* HEADER */}
        <div style={{textAlign:"center", marginBottom:40}}>
          <div style={{display:"inline-flex", alignItems:"center", gap:8,
            background:"#141720", border:"1px solid #1e2028", borderRadius:10, padding:"5px 16px", marginBottom:14}}>
            <div style={{width:7, height:7, borderRadius:"50%", background:"#4caf50", boxShadow:"0 0 6px #4caf50"}}/>
            <span style={{fontSize:11, color:"#555", fontFamily:"'JetBrains Mono',monospace"}}>
              Wave Management Bot • Milestone Tracker
              {lastSync && ` • Synced ${new Date(lastSync).toLocaleDateString()}`}
            </span>
          </div>
          <h1 style={{fontSize:"clamp(28px,5vw,54px)", fontWeight:800, fontFamily:"'Rajdhani',sans-serif",
            color:"#f0f0f0", letterSpacing:"-0.01em", lineHeight:1.1}}>
            🏅 Milestone Badges
          </h1>
          <p style={{color:"#444", marginTop:8, fontSize:13, fontFamily:"'JetBrains Mono',monospace"}}>
            All-time staff achievements — {staffList.length} members · {totalBadgesAwarded} badges awarded
          </p>
          {dataSource === "demo" && (
            <div style={{marginTop:12, display:"inline-block", background:"#1a1d23",
              border:"1px solid #fbbf2444", borderRadius:8, padding:"4px 14px",
              fontSize:11, color:"#fbbf24", fontFamily:"'JetBrains Mono',monospace"}}>
              ⚠️ Could not reach GitHub — showing demo data. Bot will sync real scores automatically each week.
            </div>
          )}
          {dataSource === "github" && (
            <div style={{marginTop:12, display:"inline-block", background:"#0d2818",
              border:"1px solid #34d39944", borderRadius:8, padding:"4px 14px",
              fontSize:11, color:"#34d399", fontFamily:"'JetBrains Mono',monospace"}}>
              ✅ Live data from GitHub — auto-updated each week by the bot
            </div>
          )}
        </div>

        {/* TIER FILTER */}
        <div style={{display:"flex", justifyContent:"center", flexWrap:"wrap", gap:8, marginBottom:28}}>
          {["All", ...TIERS].map(t => {
            const tc = t === "All" ? null : TIER_CFG[t];
            const active = filterTier === t;
            return (
              <button key={t} onClick={()=>setFilterTier(t)} style={{
                background: active ? (tc ? tc.bg : "#1e2028") : "#141720",
                border:`1px solid ${active ? (tc ? tc.border : "#a78bfa") : "#1e2028"}`,
                borderRadius:8, padding:"6px 18px",
                color: active ? (tc ? tc.text : "#a78bfa") : "#555",
                cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:13,
                display:"flex", alignItems:"center", gap:5,
                boxShadow: active && tc ? `0 0 14px ${tc.glow}` : "none",
                transition:"all 0.2s"}}>
                {t === "All" ? "🔍 All" : `${tc.icon} ${t}`}
              </button>
            );
          })}
        </div>

        {/* SEARCH + CONTROLS */}
        <div style={{display:"flex", justifyContent:"center", gap:10, marginBottom:32, flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search staff..."
            style={{background:"#141720", border:"1px solid #1e2028", borderRadius:10,
              color:"#f0f0f0", padding:"9px 16px", fontSize:13, width:230,
              fontFamily:"'JetBrains Mono',monospace", outline:"none"}}/>


        </div>

        {/* CARD GRID */}
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",
          gap:16, maxWidth:1140, margin:"0 auto"}}>
          {filtered.map(s => <StaffCard key={s.name} staff={s} onClick={()=>setSelected(s)}/>)}
          {filtered.length === 0 && (
            <div style={{gridColumn:"1/-1", textAlign:"center", color:"#2a2d38",
              fontFamily:"'JetBrains Mono',monospace", padding:60}}>No staff found.</div>
          )}
        </div>

        {/* THRESHOLD TABLE */}
        <div style={{maxWidth:1140, margin:"40px auto 0", padding:"20px 24px",
          background:"#141720", border:"1px solid #1e2028", borderRadius:16}}>
          <div style={{fontSize:11, color:"#555", fontFamily:"'Rajdhani',sans-serif",
            fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:16}}>
            📊 Milestone Thresholds
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:12}}>
            {Object.entries(DUTIES).map(([dk,d]) => (
              <div key={dk} style={{background:"#0e1116", borderRadius:10, padding:"12px 14px"}}>
                <div style={{fontSize:13, color:d.color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:8}}>
                  {d.emoji} {d.label}
                </div>
                {TIERS.map(t => (
                  <div key={t} style={{display:"flex", justifyContent:"space-between",
                    fontSize:11, fontFamily:"'JetBrains Mono',monospace", marginBottom:3}}>
                    <span style={{color:TIER_CFG[t].border}}>{TIER_CFG[t].icon} {t}</span>
                    <span style={{color:"#555"}}>{d.thresholds[t].toLocaleString()}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>

        {/* HOW SYNC WORKS */}
        <div style={{maxWidth:1140, margin:"16px auto 0", padding:"16px 24px",
          background:"#0e1116", border:"1px solid #1a2035", borderRadius:16,
          fontSize:12, color:"#444", fontFamily:"'JetBrains Mono',monospace", lineHeight:2}}>
          🤖 <strong style={{color:"#60a5fa"}}>Fully automatic flow:</strong>{" "}
          Full-week export runs → bot reads <strong style={{color:"#fbbf24"}}>column D (Total)</strong> from each Google Sheet →
          pushes <code style={{color:"#a78bfa", background:"#1e2028", padding:"1px 5px", borderRadius:3}}>milestone_totals.json</code> to GitHub →
          this page fetches it live on every load. <strong style={{color:"#34d399"}}>Zero manual steps.</strong>
        </div>
      </div>

      {selected  && <ProfileModal staff={selected} onClose={()=>setSelected(null)}/>}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
