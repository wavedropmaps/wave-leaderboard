<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wave Staff — Milestone Badges</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Exo+2:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#020408;overflow-x:hidden;}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-orb1{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 70%);top:-250px;left:-250px;pointer-events:none;z-index:0;animation:o1 14s ease-in-out infinite;}
.bg-orb2{position:fixed;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(255,0,128,0.05) 0%,transparent 70%);bottom:-350px;right:-350px;pointer-events:none;z-index:0;animation:o2 18s ease-in-out infinite;}
.bg-orb3{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,170,0,0.04) 0%,transparent 70%);top:45%;left:55%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;animation:o3 11s ease-in-out infinite;}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,-90px)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.4)}}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);opacity:.35;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#020408;}
::-webkit-scrollbar-thumb{background:linear-gradient(#00d4ff,#ff0080);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:0.4}}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.card{transition:transform 0.28s cubic-bezier(0.4,0,0.2,1),box-shadow 0.28s ease;}
.card:hover{transform:translateY(-6px) scale(1.015);}
.tbtn{transition:all 0.18s cubic-bezier(0.4,0,0.2,1);}
.tbtn:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<div class="bg-orb1"></div>
<div class="bg-orb2"></div>
<div class="bg-orb3"></div>
<div class="scanlines"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
window.storage = { get: async()=>null, set: async()=>null };

const GITHUB_USER = "wavedropmaps";
const GITHUB_REPO = "wave-leaderboard";
const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/milestone_totals.json`;

const DUTIES = {
  message: { label:"Mod Commands",      emoji:"⚔️",  color:"#00d4ff", thresholds:{Bronze:1000,Silver:3000,Gold:8000,Legend:10000,God:50000}},
  roll:    { label:"Role Giver",         emoji:"👑",  color:"#a78bfa", thresholds:{Bronze:500, Silver:1500,Gold:4000,Legend:5000, God:25000}},
  req:     { label:"Map Request Helper", emoji:"🗺️", color:"#00ff88", thresholds:{Bronze:250, Silver:750, Gold:2000,Legend:2500, God:12500}},
  purge:   { label:"Purge Perms",        emoji:"🛡️", color:"#ff4466", thresholds:{Bronze:250, Silver:750, Gold:2000,Legend:2500, God:12500}},
  modlog:  { label:"Mod Log",            emoji:"📋",  color:"#ffaa00", thresholds:{Bronze:50,  Silver:200, Gold:500, Legend:1000, God:10000}},
};
const TIERS = ["Bronze","Silver","Gold","Legend","God"];
const TC = {
  Bronze:{bg:"linear-gradient(135deg,#2a1200,#1a0a00)",border:"#cd7f32",text:"#fde68a",icon:"🥉",glow:"rgba(205,127,50,0.35)"},
  Silver:{bg:"linear-gradient(135deg,#141c28,#0c1018)", border:"#c0c0c0",text:"#f3f4f6",icon:"🥈",glow:"rgba(192,192,192,0.3)"},
  Gold:  {bg:"linear-gradient(135deg,#281800,#180f00)", border:"#ffd700",text:"#fef08a",icon:"🥇",glow:"rgba(255,215,0,0.45)"},
  Legend:{bg:"linear-gradient(135deg,#180830,#0d0420)", border:"#a78bfa",text:"#e9d5ff",icon:"⚡",glow:"rgba(167,139,250,0.45)"},
  God:   {bg:"linear-gradient(135deg,#280018,#180010)", border:"#ff0080",text:"#fce7f3",icon:"👑",glow:"rgba(255,0,128,0.55)"},
};

function getEarnedBadges(scores={}){
  const b={};
  for(const [dk,d] of Object.entries(DUTIES)){
    const s=scores[dk]||0; let hi=null;
    for(const t of TIERS) if(s>=d.thresholds[t]) hi=t;
    if(hi) b[dk]=hi;
  }
  return b;
}
function getTopTier(badges){
  return TIERS.slice().reverse().find(t=>Object.values(badges).includes(t))||null;
}
function getNextTarget(scores,dk){
  const d=DUTIES[dk],s=scores[dk]||0;
  for(const t of TIERS) if(s<d.thresholds[t]) return{tier:t,needed:d.thresholds[t],score:s};
  return null;
}
function badgeScore(scores){
  const b=getEarnedBadges(scores),w={Bronze:1,Silver:2,Gold:4,Legend:8,God:16};
  return Object.values(b).reduce((s,t)=>s+(w[t]||0),0);
}

function Badge({dutyKey,tier,size="md"}){
  const d=DUTIES[dutyKey],t=TC[tier];
  const sz={sm:{p:"3px 9px",fs:"11px",ef:"13px"},md:{p:"5px 13px",fs:"13px",ef:"16px"},lg:{p:"9px 18px",fs:"15px",ef:"20px"}}[size]||{p:"5px 13px",fs:"13px",ef:"16px"};
  return(
    <div style={{display:"inline-flex",alignItems:"center",gap:5,background:t.bg,border:`1px solid ${t.border}`,borderRadius:9,padding:sz.p,
      boxShadow:`0 0 14px ${t.glow},inset 0 1px 0 rgba(255,255,255,0.06)`,fontFamily:"'Exo 2',sans-serif",fontWeight:700,position:"relative",overflow:"hidden"}}>
      <span style={{fontSize:sz.ef}}>{t.icon}</span>
      <span style={{fontSize:sz.ef}}>{d.emoji}</span>
      <div style={{lineHeight:1.2}}>
        <div style={{fontSize:sz.fs,color:t.text,textShadow:`0 0 8px ${t.border}88`}}>{d.label}</div>
        <div style={{fontSize:"9px",color:t.border,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'Orbitron',monospace"}}>{tier}</div>
      </div>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.05) 50%,transparent 60%)",pointerEvents:"none"}}/>
    </div>
  );
}

function ProgressBar({dutyKey,score}){
  const d=DUTIES[dutyKey],next=getNextTarget({[dutyKey]:score},dutyKey);
  if(!next) return(
    <div style={{marginBottom:11}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,color:d.color,fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>{d.emoji} {d.label}</span>
        <span style={{fontSize:10,color:"#ff0080",fontFamily:"'Orbitron',monospace"}}>👑 MAX</span>
      </div>
      <div style={{height:5,borderRadius:3,background:`linear-gradient(90deg,${d.color},#ff0080)`,boxShadow:`0 0 10px ${d.color}88`}}/>
    </div>
  );
  const pi=TIERS.indexOf(next.tier)-1,pv=pi>=0?d.thresholds[TIERS[pi]]:0;
  const pct=Math.min(100,Math.max(0,((score-pv)/(next.needed-pv))*100));
  return(
    <div style={{marginBottom:11}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,color:d.color,fontFamily:"'Exo 2',sans-serif",fontWeight:700}}>{d.emoji} {d.label}</span>
        <span style={{fontSize:10,color:"#333",fontFamily:"'JetBrains Mono',monospace"}}>{score.toLocaleString()} / {next.needed.toLocaleString()} → {TC[next.tier].icon} {next.tier}</span>
      </div>
      <div style={{height:5,borderRadius:3,background:"#070d14",border:"1px solid #0f1820",overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:`linear-gradient(90deg,${d.color}66,${d.color})`,boxShadow:`0 0 8px ${d.color}88`,transition:"width 1s cubic-bezier(0.4,0,0.2,1)"}}/>
      </div>
    </div>
  );
}

function Rank({rank}){
  if(rank===1) return <span style={{fontSize:20,filter:"drop-shadow(0 0 8px gold)"}}>🥇</span>;
  if(rank===2) return <span style={{fontSize:20,filter:"drop-shadow(0 0 6px silver)"}}>🥈</span>;
  if(rank===3) return <span style={{fontSize:20,filter:"drop-shadow(0 0 6px #cd7f32)"}}>🥉</span>;
  return <span style={{fontSize:12,color:"#252d3a",fontFamily:"'Orbitron',monospace",fontWeight:700}}>#{rank}</span>;
}

function ProfileModal({staff,rank,onClose}){
  const badges=getEarnedBadges(staff.scores),earned=Object.keys(badges).length;
  const top=getTopTier(badges),tc=top?TC[top]:null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(18px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={onClose}>
      <div style={{background:"linear-gradient(160deg,#060e18,#030810)",border:`1px solid ${tc?tc.border+"55":"#0f1a28"}`,borderRadius:22,padding:34,maxWidth:570,width:"100%",
        boxShadow:tc?`0 0 60px ${tc.glow},0 40px 100px rgba(0,0,0,0.95)`:"0 40px 100px rgba(0,0,0,0.95)",maxHeight:"90vh",overflowY:"auto",animation:"fadeUp 0.3s ease"}}
        onClick={e=>e.stopPropagation()}>
        {tc&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,borderRadius:"22px 22px 0 0",background:`linear-gradient(90deg,transparent,${tc.border},transparent)`,opacity:0.8}}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:26}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:56,height:56,borderRadius:14,background:tc?tc.bg:"#070d14",border:`2px solid ${tc?tc.border+"77":"#0f1a28"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontFamily:"'Orbitron',monospace",fontWeight:900,color:tc?tc.border:"#222",boxShadow:tc?`0 0 22px ${tc.glow}`:"none"}}>
              {staff.name[0].toUpperCase()}
            </div>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <Rank rank={rank}/>
                <h2 style={{color:"#f0f0f0",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:19,textShadow:tc?`0 0 18px ${tc.border}`:"none"}}>{staff.name}</h2>
              </div>
              <span style={{fontSize:11,color:"#2a3545",fontFamily:"'JetBrains Mono',monospace"}}>{earned} badge{earned!==1?"s":""} earned{top?` • ${TC[top].icon} ${top} tier`:""}</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"#070d14",border:"1px solid #0f1a28",borderRadius:9,color:"#333",cursor:"pointer",padding:"7px 13px",fontSize:17,transition:"all 0.2s"}}>✕</button>
        </div>
        {earned>0&&(
          <div style={{marginBottom:26}}>
            <div style={{fontSize:9,color:"#ffaa00",fontFamily:"'Orbitron',monospace",fontWeight:700,letterSpacing:"0.2em",marginBottom:12,textShadow:"0 0 10px #ffaa0077"}}>⚡ EARNED BADGES</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{Object.entries(badges).map(([dk,t])=><Badge key={dk} dutyKey={dk} tier={t} size="md"/>)}</div>
          </div>
        )}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:9,color:"#00d4ff",fontFamily:"'Orbitron',monospace",fontWeight:700,letterSpacing:"0.2em",marginBottom:16,textShadow:"0 0 10px #00d4ff77"}}>📈 NEXT MILESTONE</div>
          {Object.keys(DUTIES).map(dk=><ProgressBar key={dk} dutyKey={dk} score={staff.scores[dk]||0}/>)}
        </div>
        <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid #070d14",display:"flex",flexWrap:"wrap",gap:"6px 16px"}}>
          {Object.entries(DUTIES).map(([dk,d])=>(
            <span key={dk} style={{fontSize:11,color:"#1a2030",fontFamily:"'JetBrains Mono',monospace"}}>{d.emoji} {(staff.scores[dk]||0).toLocaleString()}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

function StaffCard({staff,rank,onClick,delay}){
  const badges=getEarnedBadges(staff.scores),entries=Object.entries(badges);
  const top=getTopTier(badges),tc=top?TC[top]:null;
  return(
    <div className="card" onClick={onClick} style={{
      background:"linear-gradient(145deg,#060e18,#030810)",
      border:`1px solid ${tc?tc.border+"3a":"#0a1220"}`,
      borderRadius:17,padding:"22px 22px",cursor:"pointer",
      boxShadow:tc?`0 0 28px ${tc.glow.replace("0.","0.08")},0 8px 30px rgba(0,0,0,0.7)`:"0 6px 22px rgba(0,0,0,0.6)",
      position:"relative",overflow:"hidden",
      animation:`fadeUp 0.45s ${delay}s ease both`,
    }}>
      {tc&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${tc.border}99,transparent)`}}/>}
      {top==="God"&&<div style={{position:"absolute",inset:0,borderRadius:17,background:`linear-gradient(135deg,${tc.border}08,transparent,${tc.border}05)`,animation:"glow 2.5s infinite",pointerEvents:"none"}}/>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{minWidth:28,textAlign:"center"}}><Rank rank={rank}/></div>
          <div style={{width:42,height:42,borderRadius:11,flexShrink:0,background:tc?tc.bg:"#060e18",border:`1px solid ${tc?tc.border+"44":"#0a1220"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontFamily:"'Orbitron',monospace",fontWeight:900,color:tc?tc.border:"#1a2030",boxShadow:tc?`0 0 14px ${tc.glow}`:"none"}}>
            {staff.name[0].toUpperCase()}
          </div>
          <div>
            <div style={{color:"#dde8f0",fontFamily:"'Exo 2',sans-serif",fontWeight:800,fontSize:15,textShadow:tc?`0 0 10px ${tc.border}55`:"none"}}>{staff.name}</div>
            <div style={{fontSize:10,color:"#1a2030",fontFamily:"'JetBrains Mono',monospace"}}>{entries.length>0?`${entries.length} badge${entries.length!==1?"s":""}`:""}</div>
          </div>
        </div>
        {top&&(
          <div style={{fontSize:9,fontFamily:"'Orbitron',monospace",fontWeight:700,color:tc.border,letterSpacing:"0.1em",background:`${tc.border}14`,border:`1px solid ${tc.border}33`,padding:"4px 10px",borderRadius:7,boxShadow:`0 0 10px ${tc.glow}`,animation:top==="God"?"glow 1.8s infinite":"none"}}>
            {tc.icon} {top.toUpperCase()}
          </div>
        )}
      </div>

      {entries.length>0
        ?<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:13}}>{entries.map(([dk,t])=><Badge key={dk} dutyKey={dk} tier={t} size="sm"/>)}</div>
        :<div style={{fontSize:11,color:"#111820",fontFamily:"'JetBrains Mono',monospace",fontStyle:"italic",marginBottom:13}}>Keep grinding — first badge incoming...</div>
      }

      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {Object.entries(DUTIES).map(([dk,d])=>{
          const s=staff.scores[dk]||0,filled=TIERS.filter(t=>s>=d.thresholds[t]).length;
          return(
            <div key={dk} style={{display:"flex",alignItems:"center",gap:2}} title={`${d.label}: ${s.toLocaleString()}`}>
              <span style={{fontSize:10}}>{d.emoji}</span>
              {TIERS.map((_,ti)=><div key={ti} style={{width:5,height:5,borderRadius:2,background:ti<filled?d.color:"#0a1220",boxShadow:ti<filled?`0 0 5px ${d.color}`:"none"}}/>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const DEMO=[
  {name:"fleck.777",      scores:{message:12400,roll:4800,req:980, purge:3100,modlog:620}},
  {name:"slaxmgmt",       scores:{message:9800, roll:6200,req:2400,purge:1800,modlog:430}},
  {name:"luan_fv.",       scores:{message:6100, roll:2900,req:3200,purge:800, modlog:155}},
  {name:"ztrytytka",      scores:{message:3500, roll:1200,req:420, purge:550, modlog:88}},
  {name:"blanket_god",    scores:{message:2200, roll:900, req:180, purge:300, modlog:210}},
  {name:"meandme7634567", scores:{message:1100, roll:400, req:95,  purge:180, modlog:62}},
  {name:"banana.lecl3rc", scores:{message:800,  roll:310, req:45,  purge:90,  modlog:30}},
  {name:"joaco_t6",       scores:{message:500,  roll:200, req:30,  purge:60,  modlog:12}},
];

function App(){
  const [staffList,setStaffList]=useState(DEMO);
  const [selected,setSelected]=useState(null);
  const [filterTier,setFilterTier]=useState("All");
  const [search,setSearch]=useState("");
  const [loaded,setLoaded]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [dataSource,setDataSource]=useState("demo");

  useEffect(()=>{
    (async()=>{
      try{
        const r=await fetch(DATA_URL+"?t="+Date.now());
        if(r.ok){
          const j=await r.json();
          const s=Object.entries(j).map(([name,scores])=>({name,scores}));
          if(s.length>0){setStaffList(s);setLastSync(new Date().toISOString());setDataSource("github");setLoaded(true);return;}
        }
      }catch{}
      setLoaded(true);
    })();
  },[]);

  const filtered=staffList
    .filter(s=>s.name.toLowerCase().includes(search.toLowerCase()))
    .filter(s=>filterTier==="All"||Object.values(getEarnedBadges(s.scores)).includes(filterTier))
    .sort((a,b)=>badgeScore(b.scores)-badgeScore(a.scores));

  const totalBadges=staffList.reduce((n,s)=>n+Object.keys(getEarnedBadges(s.scores)).length,0);
  const selRank=selected?filtered.findIndex(s=>s.name===selected.name)+1:0;

  if(!loaded) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,position:"relative",zIndex:2}}>
      <div style={{fontSize:30,animation:"glow 1s infinite"}}>⚡</div>
      <span style={{color:"#00d4ff",fontFamily:"'Orbitron',monospace",fontSize:12,letterSpacing:"0.25em",textShadow:"0 0 20px #00d4ff"}}>LOADING...</span>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",padding:"50px 20px 80px",position:"relative",zIndex:2}}>

      {/* HEADER */}
      <div style={{textAlign:"center",marginBottom:50,animation:"fadeDown 0.6s ease"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(0,212,255,0.04)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:100,padding:"6px 20px",marginBottom:22}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#00ff88",boxShadow:"0 0 8px #00ff88",animation:"glow 2s infinite"}}/>
          <span style={{fontSize:10,color:"rgba(0,212,255,0.65)",fontFamily:"'Orbitron',monospace",letterSpacing:"0.16em"}}>
            WAVE MANAGEMENT · LIVE{lastSync?` · SYNCED ${new Date(lastSync).toLocaleDateString().toUpperCase()}`:""}
          </span>
        </div>

        <div>
          <h1 style={{fontSize:"clamp(38px,8vw,86px)",fontWeight:900,fontFamily:"'Orbitron',monospace",
            background:"linear-gradient(135deg,#00d4ff 0%,#ffffff 45%,#ff0080 100%)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
            letterSpacing:"-0.02em",lineHeight:1,filter:"drop-shadow(0 0 40px rgba(0,212,255,0.25))",marginBottom:2}}>
            MILESTONE
          </h1>
          <div style={{fontSize:"clamp(13px,2.5vw,22px)",fontWeight:400,fontFamily:"'Orbitron',monospace",
            color:"rgba(255,255,255,0.2)",letterSpacing:"0.45em"}}>BADGES</div>
        </div>

        <p style={{color:"#1a2535",marginTop:16,fontSize:12,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>
          {staffList.length} STAFF &nbsp;·&nbsp; {totalBadges} BADGES AWARDED
        </p>

        {dataSource==="demo"&&(
          <div style={{marginTop:14,display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,170,0,0.04)",border:"1px solid rgba(255,170,0,0.18)",borderRadius:8,padding:"5px 14px",fontSize:10,color:"#ffaa00",fontFamily:"'JetBrains Mono',monospace"}}>
            ⚠️ DEMO DATA — bot syncs real scores automatically
          </div>
        )}
        {dataSource==="github"&&(
          <div style={{marginTop:14,display:"inline-flex",alignItems:"center",gap:7,background:"rgba(0,255,136,0.04)",border:"1px solid rgba(0,255,136,0.18)",borderRadius:8,padding:"5px 14px",fontSize:10,color:"#00ff88",fontFamily:"'JetBrains Mono',monospace"}}>
            ✅ LIVE DATA — auto-updated by bot
          </div>
        )}
      </div>

      {/* TIER FILTER */}
      <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:8,marginBottom:28}}>
        {["All",...TIERS].map(t=>{
          const tc=t==="All"?null:TC[t],active=filterTier===t;
          return(
            <button key={t} className="tbtn" onClick={()=>setFilterTier(t)} style={{
              background:active?(tc?tc.bg:"rgba(0,212,255,0.08)"):"rgba(6,14,24,0.85)",
              border:`1px solid ${active?(tc?tc.border:"#00d4ff"):"#0a1220"}`,
              borderRadius:9,padding:"7px 18px",
              color:active?(tc?tc.text:"#00d4ff"):"#252d3a",
              cursor:"pointer",fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:10,letterSpacing:"0.1em",
              display:"flex",alignItems:"center",gap:5,
              boxShadow:active?(tc?`0 0 18px ${tc.glow}`:"0 0 18px rgba(0,212,255,0.25)"):"none",
            }}>
              {t==="All"?"◈ ALL":`${tc.icon} ${t.toUpperCase()}`}
            </button>
          );
        })}
      </div>

      {/* SEARCH */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:38}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#1a2535",fontSize:13}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="SEARCH STAFF..."
            style={{background:"rgba(6,14,24,0.9)",border:"1px solid #0a1220",borderRadius:11,color:"#c0ccd8",padding:"10px 16px 10px 40px",fontSize:11,width:250,fontFamily:"'Orbitron',monospace",outline:"none",letterSpacing:"0.08em",transition:"border-color 0.2s"}}
            onFocus={e=>e.target.style.borderColor="rgba(0,212,255,0.3)"}
            onBlur={e=>e.target.style.borderColor="#0a1220"}/>
        </div>
      </div>

      {/* GRID */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:14,maxWidth:1180,margin:"0 auto"}}>
        {filtered.map((s,i)=>(
          <StaffCard key={s.name} staff={s} rank={i+1} delay={Math.min(i*0.05,0.4)} onClick={()=>setSelected(s)}/>
        ))}
        {filtered.length===0&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",color:"#0a1220",fontFamily:"'Orbitron',monospace",padding:80,fontSize:11,letterSpacing:"0.2em"}}>NO STAFF FOUND</div>
        )}
      </div>

      {/* THRESHOLDS */}
      <div style={{maxWidth:1180,margin:"46px auto 0",background:"rgba(6,14,24,0.75)",border:"1px solid #0a1220",borderRadius:18,padding:"26px",backdropFilter:"blur(12px)"}}>
        <div style={{fontSize:9,color:"#00d4ff",fontFamily:"'Orbitron',monospace",fontWeight:700,letterSpacing:"0.22em",marginBottom:18,textShadow:"0 0 10px #00d4ff55"}}>◈ MILESTONE THRESHOLDS</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
          {Object.entries(DUTIES).map(([dk,d])=>(
            <div key={dk} style={{background:"rgba(3,8,16,0.8)",borderRadius:11,padding:"13px 14px",border:"1px solid #080f1a"}}>
              <div style={{fontSize:11,color:d.color,fontFamily:"'Exo 2',sans-serif",fontWeight:800,marginBottom:9,textShadow:`0 0 8px ${d.color}55`}}>{d.emoji} {d.label}</div>
              {TIERS.map(t=>(
                <div key={t} style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>
                  <span style={{color:TC[t].border,textShadow:`0 0 5px ${TC[t].border}55`}}>{TC[t].icon} {t}</span>
                  <span style={{color:"#1a2535"}}>{d.thresholds[t].toLocaleString()}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* USE CODE FOOTER */}
      <div style={{maxWidth:1180,margin:"16px auto 0",textAlign:"center",padding:"22px",background:"rgba(6,14,24,0.6)",border:"1px solid rgba(255,170,0,0.12)",borderRadius:18,backdropFilter:"blur(10px)"}}>
        <span style={{fontSize:14,color:"#2a3545",fontFamily:"'Exo 2',sans-serif",fontWeight:600}}>Use Code </span>
        <span style={{fontSize:17,fontFamily:"'Orbitron',monospace",fontWeight:900,
          background:"linear-gradient(135deg,#ffaa00,#ffd700,#ffcc44,#ffaa00)",backgroundSize:"200% auto",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
          animation:"shimmer 3s linear infinite",filter:"drop-shadow(0 0 14px rgba(255,170,0,0.45))",letterSpacing:"0.04em"}}>
          wavedropmaps
        </span>
        <span style={{fontSize:14,color:"#2a3545",fontFamily:"'Exo 2',sans-serif",fontWeight:600}}> in the Item Shop!</span>
      </div>

      {selected&&<ProfileModal staff={selected} rank={selRank} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
