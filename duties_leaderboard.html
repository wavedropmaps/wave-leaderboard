<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#0d0a15;overflow-x:hidden;font-family:'Exo 2',sans-serif;}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.orb1{width:800px;height:800px;background:radial-gradient(circle,rgba(0,212,255,0.055) 0%,transparent 70%);top:-280px;left:-280px;animation:o1 16s ease-in-out infinite;}
.orb2{width:1000px;height:1000px;background:radial-gradient(circle,rgba(255,0,128,0.04) 0%,transparent 70%);bottom:-380px;right:-380px;animation:o2 20s ease-in-out infinite;}
.orb3{width:600px;height:600px;background:radial-gradient(circle,rgba(255,170,0,0.03) 0%,transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);animation:o3 13s ease-in-out infinite;}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,50px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
@keyframes o3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.35)}}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);opacity:.25;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#0d0a15;}::-webkit-scrollbar-thumb{background:linear-gradient(#00d4ff,#ff0080);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes titleShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes modalFadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.container{position:relative;z-index:10;min-height:100vh;padding:60px 20px 100px;}
.content{max-width:1000px;margin:0 auto;}
.header{text-align:center;margin-bottom:80px;animation:fadeUp 0.6s ease both;}
.title{font-size:64px;font-weight:900;background:linear-gradient(90deg, #00d4ff, #ff0080, #00d4ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleShimmer 3s linear infinite;font-family:'Orbitron',monospace;margin-bottom:16px;letter-spacing:4px;}
.subtitle{font-size:16px;color:#888;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;margin-bottom:20px;}
.week-info{background:linear-gradient(135deg, rgba(0,212,255,0.08), rgba(255,0,128,0.05));border:1.5px solid rgba(0,212,255,0.3);border-radius:16px;padding:24px;margin-bottom:40px;animation:fadeUp 0.6s ease both;}
.week-info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:20px;}
.week-info-row:last-child{margin-bottom:0;}
.week-info-label{font-size:14px;color:#888;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.week-info-value{font-size:16px;color:#00d4ff;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;}
.time-remaining{font-size:20px;color:#ff0080;font-weight:900;font-family:'Orbitron',monospace;}
.duties-grid{display:flex;flex-wrap:wrap;gap:24px;margin-bottom:40px;justify-content:center;}
.duty-card{flex:0 0 calc(33.333% - 16px);min-width:280px;max-width:320px;}
@media(max-width:1200px){
  .duty-card{flex:0 0 calc(50% - 12px);}
}
@media(max-width:768px){
  .duty-card{flex:0 0 100%;max-width:100%;}
}
.duty-card{background:linear-gradient(135deg, var(--duty-accent), rgba(20,20,40,0.8));border:1.5px solid var(--duty-color);border-radius:16px;padding:28px;animation:fadeUp 0.5s ease both;transition:all 0.3s ease;overflow:hidden;position:relative;}
.duty-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(0,0,0,0.5),inset 0 0 40px var(--duty-color-glow);}

.duty-emoji{font-size:40px;animation:float 3s ease-in-out infinite;}

.rank-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--rank-bg);border:1px solid var(--rank-border);border-radius:10px;transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden;}

.rank-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.rank-status{font-size:12px;color:var(--rank-status-color);font-family:'JetBrains Mono',monospace;font-weight:600;}
.rank-count{font-size:22px;font-weight:900;color:var(--duty-color);font-family:'Orbitron',monospace;text-shadow:0 0 12px var(--duty-color-glow);letter-spacing:1px;position:relative;z-index:2;}

.rank-row:nth-child(1) {background:var(--rank-bg-top)!important;border-color:var(--duty-color-light)!important;}
.rank-row:nth-child(1) .rank-name{font-size:17px;font-weight:900;}

.footer-link{color:#00d4ff;text-decoration:none;transition:all 0.2s ease;}
.footer-link:hover{color:#ff0080;text-shadow:0 0 12px #ff0080;}

let currentData = PLACEHOLDER_DATA;

function getStatus(count, duty) {
  const thresholds = {
    purge: {great: 30, good: 15, okay: 5},
    req: {great: 50, good: 20, okay: 8},
    role: {great: 60, good: 30, okay: 10},
    message: {great: 200, good: 100, okay: 50},
    modlog: {great: 50, good: 25, okay: 10}
  };
  const t = thresholds[duty] || {great: 50, good: 20, okay: 5};
  if(count >= t.great) return '🌟 Great';
  if(count >= t.good) return '✅ Good';
  if(count >= t.okay) return '⚠️ Okay';
  return '❌ Bad';
}

function openProfile(name, duty) {
  const allData = {};
  ['purge', 'req', 'role', 'message', 'modlog'].forEach(function(d) {
    Object.values(currentData[d] || {}).forEach(function(member) {
      if(!allData[member.uid]) allData[member.uid] = {name: member.name, purge: 0, req: 0, role: 0, message: 0, modlog: 0};
      allData[member.uid][d] = member.count || 0;
    });
  });

  const member = Object.values(allData).find(function(m) { return m.name === name; });
  if(!member) return;

  // Find dominant duty (highest count among purge, req, role)
  const duties = {
    purge: {count: member.purge || 0, emoji: '🪣', label: 'Purge Specialist', fullLabel: 'Purge Perms'},
    req: {count: member.req || 0, emoji: '🗺️', label: 'Map Request Master', fullLabel: 'Map Requests'},
    role: {count: member.role || 0, emoji: '👤', label: 'Role Giving Expert', fullLabel: 'Role Givers'}
  };
  
  let dominant = duties.purge;
  Object.keys(duties).forEach(function(key) {
    if(duties[key].count > dominant.count) dominant = duties[key];
  });

  document.getElementById('profileName').textContent = member.name;
  document.getElementById('dominantHeading').textContent = dominant.emoji + ' ' + dominant.label.toUpperCase();
  document.getElementById('bp').textContent = member.purge || '-';
  document.getElementById('br').textContent = member.req || '-';
  document.getElementById('bro').textContent = member.role || '-';
  document.getElementById('bm').textContent = member.message || '-';
  document.getElementById('bmc').textContent = member.modlog || '-';

  document.getElementById('profileModal').classList.add('active');
}

function closeProfile() {
  document.getElementById('profileModal').classList.remove('active');
}

document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') closeProfile();
});

function updateWeekInfo(meta) {
  try {
    if(!meta) return;
    
    // Parse week period
    if(meta.start_date && meta.end_date) {
      document.getElementById('weekPeriod').textContent = meta.start_date + ' → ' + meta.end_date;
    }
    
    // Calculate time remaining
    if(meta.end_date) {
      const endDate = parseDate(meta.end_date);
      if(endDate) {
        const now = new Date();
        const diff = endDate - now;
        
        if(diff > 0) {
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          document.getElementById('timeRemaining').textContent = days + 'd ' + hours + 'h';
        } else {
          document.getElementById('timeRemaining').textContent = 'Week ended';
        }
      }
    }
  } catch(e) {
    console.debug('Could not update week info:', e);
  }
}

function parseDate(dateStr) {
  // Handle DD/MM/YYYY format
  if(dateStr.includes('/')) {
    const parts = dateStr.split('/');
    if(parts.length === 3) {
      return new Date(parts[2], parts[1] - 1, parts[0], 23, 59, 59);
    }
  }
  // Try parsing as-is
  return new Date(dateStr);
}

function renderLeaderboard(data) {
  currentData = data;
  
  // ── Update week info if available ─────────────────────────────────────
  if(data._meta) {
    updateWeekInfo(data._meta);
  }
  
  const duties = ['purge', 'req', 'role', 'message', 'modlog'];
  const html = duties.map(function(duty) {
    const cfg = DUTY_CONFIG[duty];
    if(!cfg) {
      console.error('Missing config for duty:', duty);
      return '';
    }
    const dutyData = data[duty] || {};
    
    const sorted = Object.entries(dutyData)
      .map(function(entry) {
        return {uid: entry[0], name: entry[1].name || ('User ' + entry[0]), count: entry[1].count || 0};
      })
      .sort(function(a, b) { return b.count - a.count; })
      .slice(0, 999);  // Show all staff with activity
    
    const rows = sorted.map(function(member, idx) {
      const medal = RANK_MEDALS[idx+1] || (idx+1) + '.';
      const status = getStatus(member.count, duty);
      const isTop3 = idx < 3;
      
      return '<div class="rank-row" style="--rank-bg: ' + (isTop3 ? cfg.top : 'rgba(255,255,255,0.02)') + '; --rank-bg-hover: ' + cfg.color + '20; --rank-border: ' + (isTop3 ? cfg.color + '60' : 'rgba(255,255,255,0.1)') + '; --rank-status-color: ' + cfg.color + '80; --duty-color: ' + cfg.color + '; --duty-color-glow: ' + cfg.glow + '; --duty-color-light: ' + cfg.light + ';" onclick="openProfile(\'' + member.name + '\', \'' + duty + '\')">' +
        '<div class="rank-left">' +
          '<span class="rank-medal">' + medal + '</span>' +
          '<div class="rank-info">' +
            '<div class="rank-name">' + member.name + '</div>' +
            '<div class="rank-status">' + status + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="rank-count">' + member.count + '</div>' +
      '</div>';
    }).join('');
    
    return '<div class="duty-card" style="--duty-color: ' + cfg.color + '; --duty-accent: ' + cfg.accent + '; --duty-color-light: ' + cfg.light + '; --duty-color-glow: ' + cfg.glow + ';">' +
      '<div class="duty-header">' +
        '<span class="duty-emoji">' + cfg.emoji + '</span>' +
        '<h2 class="duty-name">' + cfg.name + '</h2>' +
      '</div>' +
      '<div class="duty-list">' + (rows.length > 0 ? rows : '<div class="empty-state">No data yet</div>') + '</div>' +
    '</div>';
  }).filter(function(card) { return card.length > 0; }).join('');
  
  document.getElementById('leaderboard').innerHTML = html;
}

function loadData() {
  console.log('Loading data...');
  renderLeaderboard(PLACEHOLDER_DATA);
  console.log('Rendered placeholder data');
  
  fetch('https://raw.githubusercontent.com/wavedropmaps/wave-leaderboard/main/duties_totals.json?cache=' + Date.now())
    .then(function(res) { 
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json(); 
    })
    .then(function(json) {
      console.log('✅ Fetched from GitHub:', json);
      console.log('_meta data:', json._meta);
      if(json && typeof json === 'object') {
        console.log('Rendering live data from GitHub');
        renderLeaderboard(json);
        console.log('✅ Loaded live data from GitHub');
      }
    })
    .catch(function(e) {
      console.log('⚠️ Using placeholder data (GitHub fetch: ' + e.message + ')');
    });
}

loadData();
var refreshInterval = setInterval(loadData, 30000);

document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    clearInterval(refreshInterval);
  } else {
    refreshInterval = setInterval(loadData, 30000);
    loadData();
  }
});
</script>
